# docker-compose.mysql.yml
# Deploys backend and frontend from pre-built GHCR images using an external MySQL database.
#
# Prerequisites:
#   1. Copy .env.example to .env and fill in all values.
#   2. Ensure the target MySQL database and user already exist.
#      The backend will apply Alembic migrations automatically on startup.
#
# Usage:
#   docker compose -f docker-compose.mysql.yml up -d
#   docker compose -f docker-compose.mysql.yml pull && docker compose -f docker-compose.mysql.yml up -d   # upgrade

services:
  backend:
    image: ghcr.io/${GHCR_OWNER}/vacationbucketlist-backend:${IMAGE_TAG:-latest}
    pull_policy: always
    ports:
      - "8000:8000"
    environment:
      DB_TYPE: mysql
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      ORS_API_KEY: ${ORS_API_KEY}
    restart: unless-stopped

  frontend:
    image: ghcr.io/${GHCR_OWNER}/vacationbucketlist-frontend:${IMAGE_TAG:-latest}
    pull_policy: always
    ports:
      - "80:80"
    environment:
      BACKEND_URL: ${BACKEND_URL:-http://localhost:8000}
    depends_on:
      - backend
    restart: unless-stopped
