server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compress responses
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # Proxy API calls to the backend (strips /api prefix).
    # BACKEND_URL is substituted at container startup via envsubst.
    location /api/ {
        proxy_pass ${BACKEND_URL}/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Cache hashed static assets aggressively; never cache index.html
    location ~* "\.[0-9a-f]{8,}\.(js|css|woff2?|ttf|eot|svg|png|jpg|ico)$" {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        # Angular HTML5 pushState routing: fall back to index.html
        try_files $uri $uri/ /index.html;
    }
}
