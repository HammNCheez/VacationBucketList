<section class="page">
  <h1>People</h1>

  @if (errorMessage) {
    <p class="error">{{ errorMessage }}</p>
  }

  <mat-card>
    <form [formGroup]="form" class="row">
      <mat-form-field appearance="outline" class="grow">
        <mat-label>Name</mat-label>
        <input matInput formControlName="name" />
      </mat-form-field>
      <button mat-flat-button color="primary" (click)="addPerson()">Add</button>
    </form>
  </mat-card>

  <mat-card>
    @if (people.length === 0) {
      <p>No people added yet.</p>
    } @else {
      <ul>
        @for (person of people; track person.id) {
          <li>
            <span>{{ person.name }}</span>
            <button mat-button color="warn" (click)="deletePerson(person.id)">Delete</button>
          </li>
        }
      </ul>
    }
  </mat-card>
</section>
