<mat-toolbar class="topbar">
  <div class="nav-left">
    <a class="brand-link" mat-button routerLink="/" aria-label="Home">{{ title }}</a>
    <a class="nav-link" mat-button routerLink="/trips" routerLinkActive="active-link">
      <mat-icon aria-hidden="true">explore</mat-icon>
      <span>Trips</span>
    </a>
    <a class="nav-link" mat-button routerLink="/people" routerLinkActive="active-link">
      <mat-icon aria-hidden="true">groups</mat-icon>
      <span>People</span>
    </a>
  </div>

  <span class="spacer"></span>

  <div class="nav-right">
    <a
      class="settings-link"
      mat-icon-button
      routerLink="/settings"
      routerLinkActive="active-link"
      aria-label="Settings"
      title="Settings"
    >
      <mat-icon aria-hidden="true">settings</mat-icon>
    </a>
  </div>
</mat-toolbar>

<main class="content">
  <router-outlet></router-outlet>
</main>
